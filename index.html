<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spin Game</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #00c853, #b2ff59);
  color: white;
}

.container {
  margin-top: 50px;
}

input, button {
  padding: 12px;
  margin: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

button {
  background: #ffea00;
  cursor: pointer;
}

#wheel {
  width: 250px;
  height: 250px;
  border: 6px solid white;
  border-radius: 50%;
  margin: 20px auto;
  transition: transform 4s ease-out;
}

#result {
  font-size: 24px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎡 Spin Your Story</h1>

<div id="login">
  <input id="username" placeholder="Enter your name">
  <button onclick="start()">Start</button>
</div>

<div id="game" style="display:none;">
  <h2 id="welcome"></h2>
  <div id="wheel"></div>
  <button onclick="spin()">SPIN</button>
  <div id="result"></div>
</div>

</div>

<script>
// 🔥 FIREBASE CONFIG (BẠN SẼ THAY)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let keywords = [];

// Load keywords realtime
db.ref("keywords").on("value", snapshot => {
  keywords = [];
  snapshot.forEach(child => {
    keywords.push(child.val());
  });
});

function start() {
  username = document.getElementById("username").value;
  if (!username) return alert("Please enter your name");

  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("welcome").innerText = "Hi " + username;
}

let rotation = 0;

function spin() {
  if (keywords.length === 0) {
    alert("No keywords yet");
    return;
  }

  const index = Math.floor(Math.random() * keywords.length);
  const result = keywords[index];

  rotation += 3600 + index * (360 / keywords.length);
  document.getElementById("wheel").style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {
    document.getElementById("result").innerText = "👉 " + result;

    db.ref("results").push({
      user: username,
      keyword: result,
      time: new Date().toISOString()
    });
  }, 4000);
}
</script>

</body>
</html>
