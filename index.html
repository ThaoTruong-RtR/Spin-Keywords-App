<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Story Spin</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #00c853, #b2ff59);
  text-align: center;
  color: white;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.wheel-container {
  position: relative;
  margin: 20px auto;
  width: 320px;
  height: 320px;
}

#wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 8px solid white;
  transition: transform 4s cubic-bezier(.17,.67,.83,.67);
}

.pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

button {
  margin-top: 15px;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #ffea00;
  color: black;
  cursor: pointer;
}

#result {
  font-size: 28px;
  margin: 20px;
  font-weight: bold;
}

canvas {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
<h1>🎡 Story Spin</h1>

<div class="wheel-container">
  <div class="pointer">▼</div>
  <canvas id="wheel" width="320" height="320"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<div id="result">---</div>

<canvas id="chart"></canvas>
</div>

<script>
const keywords = [
  "Boss","Meeting","Awkward",
  "Deadline","Surprise","Mistake",
  "Customer","Funny","Problem"
];

// 🔥 FIREBASE CONFIG (REPLACE)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🎡 DRAW WHEEL
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const colors = ["#ff5252","#ff9800","#ffeb3b","#4caf50","#2196f3","#9c27b0"];

function drawWheel() {
  const angle = 2 * Math.PI / keywords.length;

  keywords.forEach((k, i) => {
    ctx.beginPath();
    ctx.moveTo(160,160);
    ctx.arc(160,160,160, i*angle, (i+1)*angle);
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();

    ctx.save();
    ctx.translate(160,160);
    ctx.rotate(i*angle + angle/2);
    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.fillText(k, 50, 5);
    ctx.restore();
  });
}
drawWheel();

// 🎡 SPIN
let rotation = 0;

function spin() {
  const randomIndex = Math.floor(Math.random() * keywords.length);
  const angle = 360 / keywords.length;
  const extraSpin = 3600;

  rotation += extraSpin + (randomIndex * angle);

  canvas.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {
    const result = keywords[randomIndex];
    document.getElementById("result").innerText = "👉 " + result;

    db.ref("results").push({
      keyword: result,
      time: new Date().toISOString()
    });

  }, 4000);
}

// 📊 CHART
const chartCtx = document.getElementById("chart").getContext("2d");

let chart = new Chart(chartCtx, {
  type: "bar",
  data: {
    labels: keywords,
    datasets: [{
      label: "Results",
      data: new Array(keywords.length).fill(0)
    }]
  }
});

db.ref("results").on("value", snapshot => {
  const counts = {};
  keywords.forEach(k => counts[k] = 0);

  snapshot.forEach(child => {
    const k = child.val().keyword;
    counts[k]++;
  });

  chart.data.datasets[0].data = keywords.map(k => counts[k]);
  chart.update();
});
</script>

</body>
</html>
